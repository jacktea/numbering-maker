name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag in the form vX.Y.Z
        required: true
        type: string

jobs:
  validate_and_build:
    name: Validate And Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.release_meta.outputs.release_version }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Go
        id: setup_go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve Release Metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported tag format: $tag" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify Tag Matches Code Version
        run: bash ./verify-release-version.sh "${{ steps.release_meta.outputs.release_tag }}"

      - name: Build Release Artifacts
        run: bash ./release.sh --output "${RUNNER_TEMP}/release"

      - name: Validate Release Artifact Set
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${RUNNER_TEMP}/release"
          expected=(
            "${release_dir}/java/numbering-maker-java-${{ steps.release_meta.outputs.release_version }}.jar"
            "${release_dir}/go/numbering-maker-go-${{ steps.release_meta.outputs.release_version }}.tar.gz"
            "${release_dir}/ts/jacktea-numbering-maker-${{ steps.release_meta.outputs.release_version }}.tgz"
            "${release_dir}/SHA256SUMS"
            "${release_dir}/manifest.txt"
          )
          for file in "${expected[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "missing expected artifact: $file" >&2
              exit 1
            fi
          done

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: ${{ runner.temp }}/release
          if-no-files-found: error

  publish_github_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate_and_build
    permissions:
      contents: write
    steps:
      - name: Download Release Bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: ${{ runner.temp }}/release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate_and_build.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.validate_and_build.outputs.release_version }}
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${RUNNER_TEMP}/release"
          assets=(
            "${release_dir}/java/numbering-maker-java-${RELEASE_VERSION}.jar"
            "${release_dir}/go/numbering-maker-go-${RELEASE_VERSION}.tar.gz"
            "${release_dir}/ts/jacktea-numbering-maker-${RELEASE_VERSION}.tgz"
            "${release_dir}/SHA256SUMS"
            "${release_dir}/manifest.txt"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TAG" --generate-notes
          fi

  publish_npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs: validate_and_build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Release Bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: ${{ runner.temp }}/release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish Package To npmjs
        env:
          RELEASE_VERSION: ${{ needs.validate_and_build.outputs.release_version }}
        run: |
          npm publish "${RUNNER_TEMP}/release/ts/jacktea-numbering-maker-${RELEASE_VERSION}.tgz" \
            --access public \
            --registry https://registry.npmjs.org/
